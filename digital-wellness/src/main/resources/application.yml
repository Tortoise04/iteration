# 应用配置
spring:
  application:
    name: digital-wellness
  datasource:
    url: jdbc:mysql://localhost:3306/iterate?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: "root"
    password: "041222"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# 日志配置
logging:
  level:
    root: INFO
    com.iterate.digitalwellness: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# AI 模型配置（支持多厂商）
ai:
  # 当前使用的厂商: zhipu / alibaba-bailing / volc-engine / openai
  provider: zhipu

  # 智谱AI配置
  zhipu:
    api-key: 254237c65bad4b7ba8aa7ce0921cd232.2kNPXtYzZcYiK8fJ
    model: glm-5.1
    api-url: https://open.bigmodel.cn/api/paas/v4/chat/completions

  # 阿里云百炼配置
  alibaba-bailing:
    api-key: sk-fbe5effd65ca478495cb81d27f113845
    model: qwen-plus
    api-url: https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation

  # 字节跳动火山引擎配置（备用）
  volc-engine:
    api-key: your-volc-engine-api-key
    model: deepseek-r1-distill-qwen-7b
    api-url: https://ark.cn-beijing.volces.com/api/v3/chat/completions

  # OpenAI 配置（备用）
  openai:
    api-key: your-openai-api-key
    model: gpt-3.5-turbo
    api-url: https://api.openai.com/v1/chat/completions
